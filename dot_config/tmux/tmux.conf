run-shell 'if command -v fish >/dev/null 2>&1; then tmux set -g default-shell "$(command -v fish)"; tmux set -g default-command "$(command -v fish)"; fi'

# true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -g status-style bg=default

# prefix
set -g base-index 1
set -g prefix M-a
set -g prefix2 none

# opts
set -g detach-on-destroy off
set -g focus-events on
set -s escape-time 0
set -s set-clipboard on
set -g mouse on
set -g status-position top

#skip kill confirmation
unbind q
bind -n M-q kill-pane

bind -n M-n display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' tv sesh
bind -n M-p run-shell "sesh last"
bind -n M-h display-popup -d "#{pane_current_path}" -w90% -h90% -E "flow_state" 

#vi mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# tabs
unbind t
bind -n M-t new-window -c '#{pane_current_path}' 

# Unbind defaults for Alt + number keys
unbind 1
unbind 2
unbind 3
unbind 4
unbind 5
unbind 6
unbind 7
unbind 8
unbind 9
unbind 0

# Bind Alt + number keys to select corresponding windows (0-based index)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

set -g status-position top
set -g status-justify left
set -g status-interval 2

set -g status-style "bg=#181818,fg=#b9b9b9"

set -g status-left-length 40
set -g status-right-length 100

set -g status-left "#[bg=#4695f7,fg=#181818,bold] #S #[bg=#181818,fg=#b9b9b9] "

set -g window-status-separator ""

set -g window-status-format "#[bg=#4695f7,fg=#181818] #I #W #[bg=#181818,fg=#b9b9b9]"
set -g window-status-current-format "#[bg=#4695f7,fg=#181818,bold] #I #W #[bg=#181818,fg=#b9b9b9]"

set -g status-right "\
#[fg=#4695f7]#(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null | sed 's/^/ /')\
#[fg=#e6c547]#(cd #{pane_current_path} && git diff --quiet 2>/dev/null || echo ' ●') \
#[fg=#5bc4bf]%H:%M "
